<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Lazy Boy">
  <!-- self-contained coin so the black markings read on a dark page; faint rim
       keeps it defined on a light browser tab too -->
  <circle cx="32" cy="32" r="29" fill="#f2f2f4" stroke="#d4d4da" stroke-width="0.75"/>
  <!-- ears: bold solid caps -->
  <circle cx="13" cy="13" r="9.5" fill="#171717"/>
  <circle cx="51" cy="13" r="9.5" fill="#171717"/>
  <!-- worried eye patches, set high so the cheeks read chubby -->
  <ellipse cx="22" cy="29" rx="8.5" ry="11" fill="#171717" transform="rotate(20 22 29)"/>
  <ellipse cx="42" cy="29" rx="8.5" ry="11" fill="#171717" transform="rotate(-20 42 29)"/>
  <!-- wide startled eyes: big whites, tiny pupils -->
  <circle cx="23" cy="29" r="4.4" fill="#f2f2f4"/><circle cx="23" cy="29.8" r="1.4" fill="#171717"/>
  <circle cx="41" cy="29" r="4.4" fill="#f2f2f4"/><circle cx="41" cy="29.8" r="1.4" fill="#171717"/>
  <!-- small nose -->
  <path d="M29.2 41 Q32 39.8 34.8 41 Q33.2 43.6 32 43.6 Q30.8 43.6 29.2 41 Z" fill="#171717"/>
  <!-- open gasp mouth -->
  <ellipse cx="32" cy="48.5" rx="2.7" ry="3.3" fill="#171717"/>
</svg>
